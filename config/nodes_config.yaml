      walk_speed_threshold: 0.5
      talk_distance_threshold: 1.5
      talk_duration_sec: 30.0
      behavior_hold_frames: 5


# ─── Dual-LiDAR Fusion / Overlay ─────────────────────────────────────────────
# Used exclusively by pipeline/06_fusion/overlay_node.py.
# node1 is the reference frame — all other sources are expressed relative to it.
fusion:
  sources:
    - node: node1
      color: [1.0, 0.5, 0.0]        # orange — node1 IS the reference frame; no transform needed

    - node: node3
      color: [0.0, 0.5, 1.0]        # blue
      # ICP calibration — calib_out/node3_to_node1.txt
      # yaw ≈ -179° (SE vs NW 180° mounting), corridor overlap 0.76, RMSE 0.15 m
      # Row-major 4×4 homogeneous matrix (node3 → node1 reference frame):
      #   top-left 3×3 = rotation R,  right column = translation in metres
      transform_to_common:
        - [-0.999514,  0.012310,  0.028644,  7.228458]
        - [-0.012119, -0.999903,  0.006848, -4.071617]
        - [ 0.028726,  0.006498,  0.999566, -0.281624]
        - [ 0.000000,  0.000000,  0.000000,  1.000000]

  output_topic: /fused/foreground
  output_frame:  fused
  publish_via:   node1   # which Jetson's rosbridge Foxglove should connect to
