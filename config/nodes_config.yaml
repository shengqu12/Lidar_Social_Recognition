nodes:
  node1:
    jetson_ip: 172.26.42.167
    jetson_user: kelrod
    rosbridge_port: 9090
    lidar_launch_file: msg_MID360_launch.py
    lidar_topic: /livox/lidar
    foreground_topic: /livox/lidar_foreground
    bg_model_path: ~/background_statistical_node1.npz
    bg_sigma: 2.5
    bg_z_min: -2.8
    bg_z_max: -0.5
    clustering:
      cluster_tol: 0.6
      min_points: 20
      max_points: 5000
      max_persons: 10
      bbox_alpha: 0.4
      bbox_color: [1.0, 0.5, 0.0]
      accum_frames: 2          # fallback when adaptive_accum.enabled is false
      exclusion_zones:
        - cx: 1.56
          cy: -1.67
          radius: 0.75
        - cx: 2.54
          cy: -1.91
          radius: 0.80
      adaptive_accum:
        enabled: true
        min_frames: 1          # frame count for fast/walking targets
        max_frames: 6          # frame count for stationary targets
        low_speed_thr: 0.2     # m/s — at or below: use max_frames
        high_speed_thr: 0.3    # m/s — at or above: use min_frames
        cold_start_frames: 1   # frames when no track velocity available (=min_frames avoids densifying cold regions)
        assoc_radius: 1.5      # m — region radius around each track
    cluster_filter:
      min_xy_size: 0.10
      max_xy_size: 1.0
      max_aspect_ratio: 4.0
      min_vertical_extent: 0.30  # metres; below this is furniture/floor noise — reject
      max_vertical_extent: 2.2   # metres; above this is spurious (merged clusters) — reject
    roi:
      enabled: true
      x_min: -0.8
      x_max: 8.0
      y_min: -4.5
      y_max: 0.3
      z_min: -2.5
      z_max: -0.5
    tracking:
      max_age: 30              # reduced from 50: Re-ID covers longer absences (reid_max_age_sec=15s)
      min_hits: 3
      max_association_dist: 0.8
      csv_logging: true
      static_suppress_frames: 20
      static_suppress_dist: 0.30
      static_zone_history: 30
      static_zone_radius: 0.5
      static_zone_density: 0.75
      static_zone_min_history: 15
      direction_weight: 0.5
      direction_min_speed: 0.3
      coast_velocity_decay: 0.6
      reid_thr: 0.5          # geometric Re-ID descriptor threshold (0 = disabled)
      reid_max_age_sec: 15.0 # seconds a lost track stays revivable in the bank
      merge_dist: 0.40       # m — merge confirmed tracks within this XY distance …
      merge_min_frames: 5    # … for this many consecutive frames (ghost suppression)
    behavior:
      enabled: true
      window_frames: 30
      min_window_frames: 15
      walk_speed_threshold: 0.5
      talk_distance_threshold: 1.5
      talk_duration_sec: 30.0
      behavior_hold_frames: 5
    rebuild_background:
      duration: 120          # recording duration in seconds (min 30)
      voxel_size: 0.10      # voxel size for background model in metres
      max_frames: 600       # max frames used to build the model
      bag_name: empty_scene_rebuild  # temp rosbag directory name on Jetson

