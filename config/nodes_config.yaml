  # ─── Virtual fused node ──────────────────────────────────────────────────────
  # Not a physical Jetson. Wires clustering_node.py / tracking_node.py into the
  # dual-LiDAR fused pipeline:
  #   overlay_node.py subscribes to both LiDARs, applies the node3→node1 rigid
  #   transform, and republishes the merged cloud to /fused/foreground via
  #   node1's rosbridge (ws://172.26.42.167:9090).
  #
  # Usage:
  #   python3 pipeline/03_tracking/tracking_node.py \
  #       --config config/nodes_config.yaml --node fused
  #   python3 pipeline/02_detection/clustering_node.py \
  #       --config config/nodes_config.yaml --node fused
  #
  # The fused cloud is already in node1's coordinate frame, so all ROI, exclusion
  # zones, and clustering params are identical to node1.
  # NOTE: x_max=8.0 clips ~3.2 m of node3's far coverage (node3 extends to x≈11.2 m
  # in node1's frame); y_min=-5.0 clips ~3.1 m (node3 extends to y≈-8.1 m).
  # Node3's coverage area may also contain different static objects not covered by
  # the existing exclusion_zones — review once the physical layout is confirmed.
  fused:
    virtual: true
    jetson_ip: 172.26.42.167      # overlay_node publishes via node1's rosbridge
    rosbridge_port: 9090
    foreground_topic: /fused/foreground
    clustering:
      cluster_tol: 0.6
      min_points: 20
      max_points: 5000
      max_persons: 10
      bbox_alpha: 0.4
      bbox_color: [1.0, 0.5, 0.0]
      accum_frames: 2
      exclusion_zones:
        - cx: 1.56
          cy: -1.67
          radius: 0.75
        - cx: 2.54
          cy: -1.91
          radius: 0.80
      adaptive_accum:
        enabled: true
        min_frames: 1
        max_frames: 6
        low_speed_thr: 0.2
        high_speed_thr: 0.3
        cold_start_frames: 1
        assoc_radius: 1.5
    cluster_filter:
      min_xy_size: 0.10
      max_xy_size: 1.0
      max_aspect_ratio: 4.0
      min_vertical_extent: 0.30
      max_vertical_extent: 2.2
    roi:
      enabled: true
      x_min: -0.8
      x_max: 8.0
      y_min: -4.5
      y_max: 0.3
      z_min: -2.5
      z_max: -0.5
    tracking:
      max_age: 30
      min_hits: 3
      max_association_dist: 0.8
      csv_logging: true
      static_suppress_frames: 20
      static_suppress_dist: 0.30
