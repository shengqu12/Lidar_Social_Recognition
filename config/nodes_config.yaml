nodes:
  node1:
    jetson_ip: 172.26.42.167
    jetson_user: kelrod
    rosbridge_port: 9090
    lidar_topic: /livox/lidar
    foreground_topic: /livox/lidar_foreground
    bg_model_path: ~/background_statistical_node1.npz
    bg_sigma: 2.5
    bg_z_min: -2.8
    bg_z_max: -0.5
    clustering:
      cluster_tol: 0.6
      min_points: 10
      max_points: 5000
      max_persons: 10
      bbox_alpha: 0.4
      bbox_color: [1.0, 0.5, 0.0]
      accum_frames: 4
      exclusion_zones:
        - cx: 1.56
          cy: -1.67
          radius: 0.75
        - cx: 2.54
          cy: -1.91
          radius: 0.80
    cluster_filter:
      min_xy_size: 0.10
      max_xy_size: 1.0
      max_aspect_ratio: 4.0
    roi:
      enabled: true
      x_min: 0.3
      x_max: 8.0
      y_min: -5.0
      y_max: -0.7
      z_min: -2.5
      z_max: -0.5
    tracking:
      max_age: 15
      min_hits: 3
      max_association_dist: 0.8
      csv_logging: true
      static_suppress_frames: 20
      static_suppress_dist: 0.30
      static_zone_history: 30
      static_zone_radius: 0.5
      static_zone_density: 0.75
      static_zone_min_history: 15
      direction_weight: 0.5
      direction_min_speed: 0.3
    behavior:
      enabled: true
      window_frames: 30
      min_window_frames: 15
      walk_speed_threshold: 0.5
      standing_height_threshold: 1.2
      talk_distance_threshold: 1.5
      talk_duration_sec: 30.0
      behavior_hold_frames: 5
